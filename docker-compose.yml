version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: telchurn_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: telchurn
      POSTGRES_PASSWORD: telchurn_secret
      POSTGRES_DB: telchurn_iq
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/sql/advanced-queries.sql:/docker-entrypoint-initdb.d/99_queries_reference.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telchurn -d telchurn_iq"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telchurn_net

  # ─────────────────────────────────────────────
  # API Server (Express + Node.js)
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: telchurn_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://telchurn:telchurn_secret@db:5432/telchurn_iq
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - telchurn_net

  # ─────────────────────────────────────────────
  # React Dashboard (Vite build → Nginx serve)
  # ─────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: telchurn_dashboard
    restart: unless-stopped
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - telchurn_net

  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: telchurn_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - dashboard
    networks:
      - telchurn_net

  # ─────────────────────────────────────────────
  # ETL Pipeline (one-shot data loader)
  # ─────────────────────────────────────────────
  etl:
    build:
      context: .
      dockerfile: Dockerfile
      target: etl
    container_name: telchurn_etl
    environment:
      DATABASE_URL: postgres://telchurn:telchurn_secret@db:5432/telchurn_iq
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
    networks:
      - telchurn_net
    profiles:
      - etl

volumes:
  postgres_data:
    driver: local

networks:
  telchurn_net:
    driver: bridge
